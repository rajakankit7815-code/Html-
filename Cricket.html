<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cricket Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#87CEEB;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

#scoreBoard{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    padding:10px 25px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 5px 10px rgba(0,0,0,.3);
}

#ground{
    position:relative;
    width:100vw;
    height:100vh;
}

.pitch{
    position:absolute;
    bottom:0;
    width:100%;
    height:170px;
    background:green;
}

/* Batsman */
#player{
    position:absolute;
    bottom:170px;
    left:120px;
    font-size:70px;
    transition:.15s;
}

/* Ball */
#ball{
    position:absolute;
    bottom:220px;
    right:-50px;
    width:30px;
    height:30px;
    background:red;
    border-radius:50%;
}

/* Message */
#msg{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    font-size:35px;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="scoreBoard">
Score : <span id="score">0</span>
&nbsp;&nbsp;|
&nbsp;&nbsp;
Wickets : <span id="wicket">0</span>
</div>

<div id="msg"></div>

<div id="ground">

<div id="player">🏏</div>

<div id="ball"></div>

<div class="pitch"></div>

</div>

<script>

let ball=document.getElementById("ball");
let player=document.getElementById("player");
let score=document.getElementById("score");
let wicket=document.getElementById("wicket");
let msg=document.getElementById("msg");

let s=0;
let w=0;

let hit=false;

function bowl(){

hit=false;

let x=window.innerWidth+50;

let game=setInterval(()=>{

x-=10;

ball.style.right=(window.innerWidth-x)+"px";

let playerX=150;

if(x<playerX+40 && x>playerX-20){

if(hit){

s++;

score.innerHTML=s;

msg.innerHTML="🏏 RUN!";

setTimeout(()=>msg.innerHTML="",600);

clearInterval(game);

setTimeout(resetBall,600);

}

}

if(x<80){

if(!hit){

w++;

wicket.innerHTML=w;

msg.innerHTML="❌ OUT!";

setTimeout(()=>msg.innerHTML="",800);

}

clearInterval(game);

if(w>=5){

msg.innerHTML="🏆 GAME OVER";

return;

}

setTimeout(resetBall,700);

}

},20);

}

function resetBall(){

ball.style.right="-50px";

setTimeout(bowl,700);

}

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

player.style.transform="rotate(-30deg)";

hit=true;

setTimeout(()=>{

player.style.transform="rotate(0deg)";

},200);

}

});

bowl();

</script>

</body>
</html>
