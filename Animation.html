<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}

.infinity{
    position:relative;
    width:220px;
    height:100px;
    animation:rotate 4s linear infinite;
}

.infinity::before,
.infinity::after{
    content:"";
    position:absolute;
    width:80px;
    height:80px;
    border:12px solid #00ffcc;
    border-radius:50px 50px 0 50px;
}

.infinity::before{
    left:0;
    transform:rotate(-45deg);
}

.infinity::after{
    right:0;
    transform:rotate(135deg);
}

@keyframes rotate{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="infinity"></div>

</body>
</html>
