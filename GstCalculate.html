<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>
<link rel="stylesheet" href="Gst.css">


</head>
<body>

<div class="container">
    <h2>GST Calculator</h2>

    <input type="number" id="amount" placeholder="Enter Amount">

<input type="number" id="gst" placeholder="Enter GST % (e.g. 18)">
<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

    <!-- <input type="number" id="amount" placeholder="Enter Amount">

    <select id="gst">
        <option value="3">3%</option>
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18" selected>18%</option>
        <option value="28">28%</option>
    </select> -->
    <script src="Gst.js"></script>
    

    <button onclick="calculateGST()">Calculate</button>
    <button class="add" onclick="addGST()">➕ Add GST</button>

<button class="remove" onclick="removeGST()">➖ Remove GST</button>

    <div class="result" id="result"></div>
</div>




</body>
</html>
