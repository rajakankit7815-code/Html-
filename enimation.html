<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌞 Automatic Day & Night Emoji Rain 🌙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Arial,sans-serif;
    transition:2s;
}

/* -------- SKY -------- */

.day{
    background:linear-gradient(to bottom,#6ec6ff,#bdefff,#ffffff);
}

.sunset{
    background:linear-gradient(to bottom,#ff9800,#ff5e62,#6a11cb);
}

.night{
    background:linear-gradient(to bottom,#020024,#090979,#000000);
}

/* -------- TITLE -------- */

h1{
    position:absolute;
    width:100%;
    top:20px;
    text-align:center;
    color:white;
    text-shadow:0 0 10px black;
    z-index:100;
}

#time{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:100;
}

/* -------- SUN & MOON -------- */

#sun,#moon{
    position:absolute;
    top:70px;
    left:-120px;
    font-size:90px;
    transition:2s;
    z-index:20;
}

/* -------- STARS -------- */

.star{
    position:absolute;
    color:white;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* -------- EMOJIS -------- */

.emoji{
    position:absolute;
    top:-100px;
    user-select:none;
    pointer-events:none;
    animation-name:fall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
}

100%{
transform:translateY(120vh) rotate(720deg);
}

}

</style>
</head>

<body class="day">

<h1>🌧️ 100 Emoji Rain 🌧️</h1>
<div id="time">☀️ DAY</div>

<div id="sun">☀️</div>
<div id="moon">🌙</div>

<script>

// ---------------- EMOJIS ----------------

const emojis=[
"😂","😍","😎","🤩","🥳","😜","😇","🤖","👻","💀",
"❤️","💙","💚","💛","💜","🧡","🔥","⭐","🌈","⚡",
"🍕","🍔","🍟","🍩","🍎","🍉","🍓","🍌","🍇","🥭",
"🚀","🚗","✈️","🚁","🚲","🎮","⚽","🏀","🎸","🎵",
"🐶","🐱","🐼","🦁","🐸","🐵","🐧","🦄","🐬","🐢"
];

for(let i=0;i<100;i++){

let e=document.createElement("div");

e.className="emoji";

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";

e.style.fontSize=(20+Math.random()*45)+"px";

e.style.animationDuration=(4+Math.random()*8)+"s";

e.style.animationDelay=(-Math.random()*10)+"s";

document.body.appendChild(e);

}

// ---------------- STARS ----------------

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.innerHTML="⭐";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.style.fontSize=(6+Math.random()*12)+"px";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

// ---------------- DAY/NIGHT ----------------

const sun=document.getElementById("sun");
const moon=document.getElementById("moon");
const label=document.getElementById("time");

const modes=["day","sunset","night"];
let current=0;

function updateScene(){

document.body.className=modes[current];

if(modes[current]=="day"){

label.innerHTML="☀️ DAY";

sun.style.left="85%";
sun.style.opacity=1;

moon.style.left="-120px";
moon.style.opacity=0;

document.querySelectorAll(".star").forEach(star=>{
star.style.display="none";
});

}

if(modes[current]=="sunset"){

label.innerHTML="🌇 SUNSET";

sun.style.left="45%";
sun.style.opacity=1;

moon.style.left="-120px";
moon.style.opacity=0;

document.querySelectorAll(".star").forEach(star=>{
star.style.display="none";
});

}

if(modes[current]=="night"){

label.innerHTML="🌙 NIGHT";

sun.style.left="110%";
sun.style.opacity=0;

moon.style.left="75%";
moon.style.opacity=1;

document.querySelectorAll(".star").forEach(star=>{
star.style.display="block";
});

}

current++;

if(current>=modes.length)
current=0;

}

updateScene();

setInterval(updateScene,8000);

</script>

</body>
</html>
